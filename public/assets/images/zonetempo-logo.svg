<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,300&amp;display=swap');
    </style>
    <!-- Vinyl groove pattern -->
    <radialGradient id="vinylGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="40%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </radialGradient>
    <radialGradient id="labelGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C4500A"/>
      <stop offset="100%" stop-color="#9e3d06"/>
    </radialGradient>
  </defs>

  <!-- Vinyl Record -->
  <!-- Outer ring -->
  <circle cx="40" cy="40" r="36" fill="url(#vinylGrad)"/>
  <!-- Groove rings -->
  <circle cx="40" cy="40" r="34" fill="none" stroke="#2d2d2d" stroke-width="0.4"/>
  <circle cx="40" cy="40" r="31" fill="none" stroke="#222" stroke-width="0.4"/>
  <circle cx="40" cy="40" r="28" fill="none" stroke="#2d2d2d" stroke-width="0.4"/>
  <circle cx="40" cy="40" r="25" fill="none" stroke="#222" stroke-width="0.4"/>
  <circle cx="40" cy="40" r="22" fill="none" stroke="#2d2d2d" stroke-width="0.4"/>
  <circle cx="40" cy="40" r="19" fill="none" stroke="#222" stroke-width="0.4"/>
  <!-- Center label -->
  <circle cx="40" cy="40" r="13" fill="url(#labelGrad)"/>
  <!-- Label text -->
  <text x="40" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="5.5" font-weight="bold" fill="#fff" letter-spacing="0.5">ZONE</text>
  <text x="40" y="45" text-anchor="middle" font-family="Georgia, serif" font-size="4" fill="rgba(255,255,255,0.7)" letter-spacing="1">TEMPO</text>
  <!-- Center hole -->
  <circle cx="40" cy="40" r="2.5" fill="#0d0d0d"/>
  <!-- Shine highlight -->
  <ellipse cx="28" cy="22" rx="6" ry="3" fill="rgba(255,255,255,0.04)" transform="rotate(-30 28 22)"/>

  <!-- Brand Name -->
  <text x="88" y="34" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="400" fill="#0d0d0d" letter-spacing="-0.5">Zone</text>
  <text x="88" y="34" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="400" fill="#C4500A" letter-spacing="-0.5" dx="58">tempo</text>

  <!-- Tagline -->
  <text x="89" y="52" font-family="Georgia, serif" font-size="8" font-style="italic" fill="#8A7F72" letter-spacing="1.5">vinyl record store</text>

  <!-- Decorative line -->
  <line x1="89" y1="57" x2="290" y2="57" stroke="#C4500A" stroke-width="0.8" opacity="0.4"/>
</svg>
